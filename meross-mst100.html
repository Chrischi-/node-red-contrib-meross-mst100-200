<script type="text/javascript">
  RED.nodes.registerType("meross cloud config", {
    category: "config",
    defaults: {
      name: { value: "" },
      email: { value: "" },
      password: { value: "" },
      baseUrl: { value: "https://iotx-eu.meross.com" },
      loginPath: { value: "/v1/Auth/signIn" },
      countryCode: { value: "us" },
      locale: { value: "de_DE" },
      mfaCode: { value: "" }
    },
    label: function () {
      return this.name || this.email || "Meross cloud";
    },
    oneditprepare: function () {
      // Add any custom validation or initialization here
    }
  });

  function merossHubSprinklerDefinition(modelName) {
    return {
      category: "function",
      color: "#f2b134",
      defaults: {
        name: { value: "" },
        cloud: { type: "meross cloud config", required: true },
        hubId: { value: "" },
        hubHost: { value: "" },
        subDeviceId: { value: "" },
        deviceId: { value: "" },
        channel: { value: 0, validate: RED.validators.number() },
        command: { value: "rawRequest" },
        method: { value: "POST" },
        path: { value: "/v1/Device/Status" },
        onoff: { value: true },
        duration: { value: "" }
      },
      inputs: 1,
      outputs: 1,
      icon: "font-awesome/fa-tint",
      label: function () {
        return this.name || `Meross ${modelName}`;
      },
      oneditprepare: function () {
        // Show/hide relevant fields based on command selection
        const commandField = $("#node-input-command");
        const updateVisibility = function () {
          const cmd = commandField.val();
          $("#row-hubId").toggle(cmd === "listSubDevices" || cmd === "subStatus" || cmd === "subSwitch");
          $("#row-hubHost").toggle(cmd === "subStatus" || cmd === "subSwitch");
          $("#row-subDeviceId").toggle(cmd === "subStatus" || cmd === "subSwitch");
          $("#row-deviceId").toggle(cmd === "status" || cmd === "switch" || cmd === "rawRequest");
          $("#row-channel").toggle(cmd === "status" || cmd === "switch" || cmd === "subStatus" || cmd === "subSwitch");
          $("#row-method").toggle(cmd === "rawRequest");
          $("#row-path").toggle(cmd === "rawRequest");
          $("#row-onoff").toggle(cmd === "subSwitch");
          $("#row-duration").toggle(cmd === "subSwitch");
        };
        commandField.on("change", updateVisibility);
        updateVisibility();
      }
    };
  }

  RED.nodes.registerType("meross mst100", merossHubSprinklerDefinition("MST100"));
  RED.nodes.registerType("meross mst200", merossHubSprinklerDefinition("MST200"));
</script>

<script type="text/x-red" data-help-name="meross mst100">
  <p>Meross MST100 sprinkler control node.</p>
  <h3>Configuration</h3>
  <dl class="message-properties">
    <dt>Cloud config <span class="property-type">config</span></dt>
    <dd>Select a Meross cloud configuration node with your credentials.</dd>
  </dl>
  <h3>Commands</h3>
  <ul>
    <li><b>Raw request</b> - Send arbitrary API requests</li>
    <li><b>List devices</b> - Get all devices from cloud</li>
    <li><b>List subdevices</b> - Get devices connected to a hub</li>
    <li><b>Device status</b> - Get device status</li>
    <li><b>Device on/off</b> - Turn device on or off</li>
    <li><b>MST100/MST200 status</b> - Get sprinkler status via hub</li>
    <li><b>MST100/MST200 start/stop</b> - Start or stop sprinkler via hub</li>
  </ul>
  <p>For MST100, subdevice commands use the water control namespace. Channel and duration are supported.</p>
  <h3>Input</h3>
  <p>Messages can override node configuration:</p>
  <ul>
    <li><code>msg.command</code> - Override command</li>
    <li><code>msg.deviceId</code> - Override device UUID</li>
    <li><code>msg.onoff</code> - Set on/off state (true/false)</li>
    <li><code>msg.duration</code> - Set sprinkler duration in seconds</li>
    <li><code>msg.payload</code> - Custom request payload</li>
  </ul>
  <h3>Output</h3>
  <p>The response is sent to <code>msg.payload</code> and metadata to <code>msg.meross</code>.</p>
</script>
